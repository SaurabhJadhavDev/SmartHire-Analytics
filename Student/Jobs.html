<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs</title>
    <link rel="stylesheet" href="../CSS/Jobs.css">
</head>

<body>
    <header>

        <h1>CareerConnect</h1>

        <nav>
            <a href="Student_Dashboard.php">Home</a>
            <a href="Jobs.html">Jobs</a>
            <a href="Application.html">My Applications</a>
            <a href="Profile.php">Profile</a>
            <a href="Logout.php">Logout</a>
        </nav>
    </header>

    <section class="search-section">
        <h2>Find Your Dream Job</h2>

        <div class="search-box">
            <input type="text" placeholder="Search Jobs">
            <button>Search</button>
        </div>

        <div class="filter">
            <label for="location">Location</label>
            <select id="location">
                <option>Location</option>
                <option>Pune</option>
                <option>Mumbai</option>
            </select>

            <label for="jobType">Job Type</label>
            <select id="jobType">
                <option>Job type</option>
                <option>Intership</option>
                <option>Full Time</option>
            </select>

            <label for="salary">Salary</label>
            <select id="salary">
                <option>Salary</option>
                <option>$10k - $20k</option>
                <option>$20k -$30k</option>
            </select>
        </div>
    </section>

    <section class="jobs">

        <div class="job-card">
            <h3>Software Developer Intern</h3>

            <p><strong>Company:</strong>ABC Technology</p>

            <p><strong>Location:</strong>Pune</p>

            <p><strong>Salary:</strong>$20,000/month</p>

            <p>
                Looking for students with Java,SQL,HTML and CSS knowladge
            </p>
        </div>



        <button class="apply-btn">Apply Now</button>
    </section>

</body>

</html>

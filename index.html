<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/home.css">
     <link rel="stylesheet" href="CSS/common.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h2>CareerConnect</h2>
                <p>Find.Apply.Grow.</p>
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Jobs</a></li>
                <li><a href="#">Companies</a></li>
                <li><a href="#">Skill Test</a></li>
                <li><a href="#">Career Resources</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="buttons">
                <a href="Choose_Login.html" class="login">Login</a>
                <a href="Choose_Register.html" class="register">Register</a>
            </div>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-content">
            <span class="hero-tag">Find Your Dream Job</span>
            <h1>
                Discover Opportunities,<br>
                Build<span class="highlight">Your Future</span>
            </h1>

            <p>
                Explore thousands of jobs from top companies.<br>
                Find interships and full-time opportunities.
            </p>

            <div class="search-box">
                <input type="text" placeholder="Job title or keyword">

                <input type="text" placeholder="Location">

                <button class="search-btn">
                    Search Jobs
                </button>
            </div>
        </div>

        <div class="hero-image">
            <img src="images/City_Boy.jpg" alt="Career image">
        </div>
    </section>
</body>
</html>

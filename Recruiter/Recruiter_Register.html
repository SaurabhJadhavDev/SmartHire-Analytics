<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Register</title>
    <link rel="stylesheet" href="../CSS/common.css">
    <link rel="stylesheet" href="../CSS/Register.css">
    <link rel="stylesheet" href="../CSS/Recruiter.css">
</head>

<body>
    <div class="register-container">

        <h1>Create Recruiter Account</h1>

        <p>
            Join CareerConnect and start hiring talented candidates
        </p>

        <form>

            <div class="form-row">
                <label>Company Name</label>
                <input type="text" placeholder="Enter your company name" required>
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" placeholder="Enter your Email" required>
            </div>
            <div class="form-row">
                <label>Password</label>

                <input type="password" placeholder="Create Password" required>
            </div>

            <button type="submit" class="register-btn">
                Create Recruiter Account
            </button>

            <a href="/Home/Choose_Register.html">
                <button type="button" class="back-btn">
                    Back
                </button>
            </a>
        </form>
        <p>
            Already have an account?

            <a href="Recruiter_Login.html">
                Login
            </a>
        </p>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/Recruiter_login.css">

</head>

<body>

    <div class="login-container">

        <h1>Create Recruiter Login</h1>

        <p class="login-message">Login to manage your job postings and applicants.</p>

        <form action="#" method="post">

            <div class="form-row">
                <label>Email</label>
                <input type="email" placeholder="Enter your Email" required>
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="button-row">
                <button type="submit" class="login-btn">
                    Login
                </button>

                <a href="../Home/Choose_Login.html">
                    <button type="button" class="back-btn">
                        Back
                    </button>

                </a>

            </div>

            
                

        
        </form>

        <p class="register-link">
            Don't have an account?
            <a href="Recruiter_Register.html">Register</a>
        </p>
    </div>

</body>

</html>

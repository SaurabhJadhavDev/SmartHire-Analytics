<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/Admin.css">
</head>
<body>

    <div class="login-container">

        <h1>Admin Login</h1>

        <p class="login-message">
            Login to manage students,recruiters and jobs
        </p>

        <form>
            <div class="form-row">
                <label>Admin ID</label>
                <input type="text" placeholder="Enter Admin ID">
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" placeholder="Enter Password">
            </div>

            <div class="button-row">

                <button type="submit" class="login-btn admin-btn">
                    Login
                </button>

                <a href="../Home/Choose_Login.html">
                    <button type="button" class="login-btn back-btn">
                        Back
                    </button>
                </a>
            </div>
        </form>

    </div>
    
</body>
</html>
